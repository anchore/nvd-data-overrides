name: "Generate NVD Data Overrides"

on: 
  workflow_dispatch:
    branches:
      - main
  schedule:
    - cron: '20 * * * MON-FRI'

concurrency:
  group: generate
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
    name: "Generate NVD overrides from enriched records"
    runs-on: ubuntu-latest
    container:
      image: python:3.14-alpine
    if: github.repository == 'anchore/nvd-data-overrides' # only run for main repo
    steps:
      - name: Install OS dependencies
        run: apk add --no-cache bash git
      - name: Install python dependencies
        run: pip install check-jsonschema cpe
      - name: Configure git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
      - name: Clean data directory
        run: |
          rm -rf data/*
      - name: Generate NVD override records
        run: ./scripts/generate.sh
      - name: Verify overrides json schema
        run: check-jsonschema --schemafile schema/overrides.schema.json data/**/*.json
      - name: Commit changes
        run: |
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            ./scripts/commit.sh
            git push
